<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تحميل تطبيق بوابة بوصلة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <style>
    body { font-family: 'Cairo', sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 30px 15px; }
    .box { background: #fff; padding: 35px 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); max-width: 380px; margin: auto; }
    .logo-img { width: 110px; margin-bottom: 15px; }
    h2 { color: #001f4d; font-weight: 700; margin-bottom: 8px; font-size: 24px;}
    p { color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 25px;}
    .btn { display: block; margin: 12px auto; padding: 14px; color: white; text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 17px; width: 90%; box-sizing: border-box; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; background: #001f4d; }
    .link-alt { display: block; margin-top: 20px; color: #777; text-decoration: underline; font-size: 15px;}
    #instructionBox { background: #e9f2fc; color: #001f4d; padding: 15px; border-radius: 8px; font-size: 15px; margin-top: 15px; border: 1px solid #cce0f5; display: none; line-height: 1.6;}
  </style>
</head>
<body>
  <div class="box">
    <img src="icon-192.png" class="logo-img" alt="لوجو بوابة بوصلة">
    <h2>تطبيق بوابة بوصلة</h2>
    <p>للحصول على أسرع تجربة ومتابعة أحدث فرص الهجرة، حمل التطبيق الآن مجاناً.</p>
    <button id="installBtn" class="btn">⬇️ تثبيت التطبيق</button>
    <div id="instructionBox"></div>
    <a href="https://boslagate.com" class="link-alt">تصفح الموقع بدلاً من ذلك</a>
  </div>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('✅ SW Registered'))
        .catch(err => console.log('❌ SW Error:', err));
    }
    
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if (isStandalone) {
      if (navigator.onLine) {
        window.location.href = "https://boslagate.com";
      }
    } else {
      let deferredPrompt = null;
      const installBtn = document.getElementById('installBtn');
      const instructionBox = document.getElementById('instructionBox');
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('✅ beforeinstallprompt FIRED!');
        e.preventDefault();
        deferredPrompt = e;
      });

      installBtn.addEventListener('click', () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        } else if (isIOS) {
          installBtn.innerText = "طريقة التثبيت للآيفون 🍏";
          instructionBox.innerHTML = "اضغط على زر <b>المشاركة ⇪</b> أسفل الشاشة<br>ثم <b>إضافة للشاشة الرئيسية</b>";
          instructionBox.style.display = 'block';
        } else {
          installBtn.innerText = "طريقة التثبيت 🛡️";
          instructionBox.innerHTML = "اضغط على <b>الثلاث نقاط ⋮</b> أعلى يمين<br>ثم اختر <b>تثبيت التطبيق</b> أو <b>إضافة إلى الشاشة الرئيسية</b>";
          instructionBox.style.display = 'block';
        }
      });
    }
  </script>
</body>
</html>
