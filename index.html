<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>بوابة بوصلة - Bosla Gate</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0056b3">
  
  <style>
    body { 
      font-family: 'Cairo', sans-serif; /* تفعيل فونت كايرو */
      text-align: center; 
      background-color: #f0f4f8; 
      margin: 0; 
      padding: 40px 15px; 
    }
    .box { 
      background: #fff; 
      padding: 35px 25px; 
      border-radius: 15px; 
      box-shadow: 0 10px 25px rgba(0,86,179,0.1); 
      max-width: 400px; 
      margin: auto; 
      display: none; 
    }
    .logo-img {
      width: 90px;
      border-radius: 22px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 { color: #0056b3; font-weight: 700; margin-bottom: 10px; font-size: 24px;}
    p { color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 25px; font-weight: 400;}
    .btn { 
      display: block; 
      margin: 15px auto; 
      padding: 14px 25px; 
      color: white; 
      text-decoration: none; 
      border-radius: 8px; 
      font-weight: 700; 
      font-size: 17px; 
      width: 90%; 
      box-sizing: border-box; 
      border: none; 
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s ease;
    }
    .install-btn { background: #0056b3; }
    .install-btn:hover { background: #004494; }
    .whatsapp-btn { background: #25D366; }
    .link-alt { 
      display: block; 
      margin-top: 20px; 
      color: #777; 
      text-decoration: underline; 
      font-size: 15px;
    }
    #installHint {
      background: #e9f2fc;
      color: #0056b3;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 15px;
      display: none;
      border: 1px solid #cce0f5;
    }
  </style>
</head>
<body>

  <div id="installScreen" class="box">
    <img src="icon-192.png" class="logo-img" alt="لوجو بوابة بوصلة">
    <h2>تطبيق بوابة بوصلة</h2>
    <p>للحصول على أسرع تجربة ومتابعة أحدث فرص الهجرة، حمل التطبيق الآن على هاتفك مجاناً.</p>
    
    <button id="installBtn" class="btn install-btn">⬇️ تثبيت التطبيق</button>
    
    <div id="installHint"></div>

    <a href="https://boslagate.com" class="link-alt">تصفح الموقع بدلاً من ذلك</a>
  </div>

  <div id="offlineScreen" class="box">
    <h2>أنت غير متصل بالإنترنت 🌐</h2>
    <p>يبدو أن اتصالك بالإنترنت مقطوع حالياً، لكننا مستعدون لاستقبال استفساراتك حول الهجرة والسفر في أي وقت.</p>
    <a href="https://wa.me/201221640440" class="btn whatsapp-btn">💬 تواصل عبر الواتساب</a>
    <a href="tel:01221640440" class="btn install-btn">📞 اتصل بنا الآن</a>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    if (isStandalone) {
      if (navigator.onLine) {
        window.location.replace("https://boslagate.com");
      } else {
        document.getElementById('offlineScreen').style.display = "block";
      }
    } else {
      document.getElementById('installScreen').style.display = "block";
      
      let deferredPrompt;
      const installBtn = document.getElementById('installBtn');
      const installHint = document.getElementById('installHint');
      
      // اكتشاف أجهزة أبل (الآيفون والآيباد)
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
      });

      installBtn.addEventListener('click', () => {
        if (deferredPrompt) {
          // لو موبايل أندرويد عادي ومش تصفح خفي
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        } else if (isIOS) {
          // لو الموبايل آيفون
          installHint.style.display = 'block';
          installHint.innerHTML = '<b>للآيفون:</b> اضغط على زر المشاركة (Share) ⇪ أسفل الشاشة، ثم اختر <br> <b>إضافة للشاشة الرئيسية</b> <br> (Add to Home Screen).';
        } else {
          // لو أندرويد بس فاتح تصفح خفي أو متصفح لا يدعم
          installHint.style.display = 'block';
          installHint.innerHTML = 'اضغط على <b>الثلاث نقاط (⋮)</b> أعلى المتصفح، ثم اختر <br> <b>تثبيت التطبيق</b> <br> (Install app).';
        }
      });
    }
  </script>
</body>
</html>
