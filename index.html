<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق بوابة بوصلة</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#001f4d">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #001f4d; margin-bottom: 5px; }
        p { color: #555; margin-bottom: 25px; }
        
        .install-btn {
            background-color: #001f4d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            display: none; /* مخفي افتراضياً حتى يوافق المتصفح */
            margin: 0 auto;
        }
        .ios-instructions {
            display: none; /* مخفي افتراضياً */
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>بوابة بوصلة</h1>
        <p>التطبيق الرسمي لخدمات الهجرة</p>
        
        <button id="installBtn" class="install-btn">تثبيت التطبيق ⬇️</button>
        
        <div id="iosInstructions" class="ios-instructions">
            لتثبيت التطبيق على الآيفون: <br> اضغط على زر <strong>المشاركة</strong> بالأسفل ثم اختر <br> <strong>إضافة للشاشة الرئيسية (Add to Home Screen)</strong> 🍏
        </div>
    </div>

    <script>
        // 1. تسجيل السيرفيس وركر
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ Service Worker Registered'))
                    .catch(err => console.log('❌ SW Error', err));
            });
        }

        // 2. منطق إظهار زر التثبيت (جوجل كروم / أندرويد)
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const iosInstructions = document.getElementById('iosInstructions');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block'; // المتصفح سمح، نظهر الزر
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // 3. كشف الآيفون لإظهار الشرح المخصص
        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        };
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        // لو الجهاز آيفون والتطبيق مش متثبت، أظهر الشرح
        if (isIos() && !isInStandaloneMode()) {
            iosInstructions.style.display = 'block';
        }
    </script>
</body>
</html>
